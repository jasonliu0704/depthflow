services:
  depthflow-api:
    image: ${DEPTHFLOW_API_IMAGE:-depthflow-api:deploy}
    container_name: depthflow-api
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      DEPTHFLOW_API_WORKDIR: ${DEPTHFLOW_API_WORKDIR:-/app/.depthflow-api}
      DEPTHFLOW_API_DEFAULT_OUTPUT_TARGET: ${DEPTHFLOW_API_DEFAULT_OUTPUT_TARGET:-local}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-}
      AZURE_PUBLIC_BASE_URL: ${AZURE_PUBLIC_BASE_URL:-}
      HOST: 0.0.0.0
      PORT: 8000
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      UVICORN_LOG_LEVEL: ${UVICORN_LOG_LEVEL:-info}
    volumes:
      - ./workdir:/app/.depthflow-api
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
